<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapMoment | Video Scene Retrieval</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <h1 class="logo">Snap<span>Moment</span></h1>
            <p class="tagline">High-Accuracy Efficient Video Scene Retrieval</p>
        </header>

        <main>
            <section class="upload-section">
                <div id="dropZone" class="upload-zone glass">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <p>Drag & Drop video to start indexing</p>
                    <input type="file" id="fileInput" class="hidden" accept="video/*">
                    <button id="browseBtn">Browse Files</button>
                </div>
                <div id="uploadStatus" class="upload-status hidden glass">
                    <div class="status-content">
                        <div class="spinner-small"></div>
                        <p id="statusText">Uploading video...</p>
                    </div>
                </div>
            </section>

            <section class="search-section">
                <div class="search-box glass">
                    <input type="text" id="queryInput" placeholder="Describe a scene... (e.g., 'a car driving through a futuristic city')">
                    <button id="searchBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        Search
                    </button>
                </div>
            </section>

            <section class="results-section">
                <div id="loading" class="hidden">
                    <div class="spinner"></div>
                    <p>Analyzing video scenes...</p>
                </div>
                <div id="resultsGrid" class="results-grid">
                    <!-- Results will be injected here -->
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 SnapMoment Offline Retrieval System</p>
        </footer>
    </div>

    <template id="resultCardTemplate">
        <div class="result-card glass fade-in">
            <div class="card-header">
                <span class="video-id">Video: testX</span>
                <span class="score-badge">Match: 98%</span>
            </div>
            <div class="card-body">
                <h3>Detected Scene</h3>
                <div class="timestamps">
                    <span class="timestamp-tag">00:33 - 00:39</span>
                </div>
            </div>
            <div class="card-footer">
                <button class="play-btn">Play Segment</button>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
